name: dev_guard
description: "A high-performance remote licensing and app-protection plugin for Flutter. Secured by HMAC signatures and native FFI (Secure Enclave), it enables developers to remotely lock, warn, or sync applications via the DevGuard REST API."
version: 1.0.1
homepage: https://github.com/DevGuard-uk/dev_guard
repository: https://github.com/DevGuard-uk/dev_guard
issue_tracker: https://github.com/DevGuard-uk/dev_guard/issues

environment:
  sdk: ^3.11.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  android_id: ^0.5.1
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  http: ^1.6.0
  ffi: ^2.2.0
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0
  battery_plus: ^7.0.0
  connectivity_plus: ^7.1.1
  geolocator: ^14.0.3
  flutter_secure_storage: ^10.3.1
  root_jailbreak_guard: ^1.0.0
  flutter_vault_logger: ^0.1.2
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        pluginClass: DevGuardPlugin
        ffiPlugin: true

false_secrets:
  - /example/android/app/google-services.json
  - /example/ios/Runner/GoogleService-Info.plist
  - /example/lib/firebase_options.dart
